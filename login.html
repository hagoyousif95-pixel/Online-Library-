    <title>Online Library Management System - تسجيل الدخول</title>

</head>
<body>

    <nav class="navbar">
        <div class="container">
            <div class="logo"><h1>📚 مكتبتي</h1></div>
            <ul class="nav-links">

                <span></span><span></span><span></span>

        </div>
    </nav>

    <main class="login-page">
        <div class="container">
            <div class="login-box">
                <h2>🔐 تسجيل الدخول</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">البريد الإلكتروني:</label>
                        <input type="email" id="loginEmail" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">كلمة المرور:</label>
                        <input type="password" id="loginPassword" placeholder="********" required>
                    </div>
                    <button type="submit" class="btn btn-primary">دخول</button>
                </form>
                <p class="signup-link">ليس لديك حساب؟ <a href="#">سجل الآن</a></p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Online Library Management System. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script src="script.js"></script>
